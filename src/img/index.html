<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwindcss</title>
    <link rel="stylesheet" href="../css/output.css" />
    <link rel="stylesheet" href="./../css/index.css" />
  </head>
  <body
    class="bg-white dark:bg-slate-900 text-black dark:text-white transition-all"
  >
    <header>
      <div class="flex justify-between items-center px-10 py-5">
        <a href="#">
          <img src="./logo-dark.svg" class="hidden dark:block" alt="logo" />
          <img src="./logo-light.svg" class="dark:hidden" alt="logo" />
        </a>

        <nav class="flex items-center gap-5">
            <button data-collapse-toggle="navbar-dropdown" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary" aria-controls="navbar-dropdown" aria-expanded="false">
        <span class="sr-only">Open main menu</span>
        <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14"/></svg>
    </button>
    <div class="hidden w-full md:block md:w-auto" id="navbar-dropdown">
      <ul class="flex flex-col font-medium p-4 md:p-0 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-neutral-primary">
        <li>
          <a href="#" class="py-2 px-3 bg-brand rounded text-blue-600 ">Home</a>
        </li>
        <li>
            <button id="dropdownNvbarButton" data-dropdown-toggle="dropdownNavbar" class="flex items-center justify-between w-full py-2 px-3 rounded font-medium text-heading md:w-auto hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:hover:text-blue-600">
              Dropdown 
              <svg class="w-4 h-4 ms-1.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7"/></svg>
          </button>
          <!-- Dropdown menu -->
          <div id="dropdownNavbar" class="z-10 hidden bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-44">
              <ul class="p-2 text-sm text-body font-medium" aria-labelledby="dropdownNvbarButton">
                <li>
                  <a href="#" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded">Blog Grid</a>
                </li>
                <li>
                  <a href="#" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded">Sign In</a>
                </li>
                <li>
                  <a href="#" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded">Sign Up</a>
                </li>
                <li>
                  <a href="#" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded">Docs</a>
                </li>
                <li>
                  <a href="#" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded">Support</a>
                </li>
                <li>
                  <a href="#" class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded">404</a>
                </li>
              </ul>
          </div>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent md:hover:text-blue-600">Services</a>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent md:hover:text-blue-600">Pricing</a>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent md:hover:text-blue-600">Contact</a>
        </li>
      </ul>
    </div>
  </div>
          <div class="relative group inline-block">
            <button
              id="btn-toggle"
              class="p-3 bg-slate-700 hover:bg-slate-600 rounded-xl transition-all border border-slate-600"
            >
              <img
                src="./icon-sun.svg"
                class="w-6 h-6 hidden dark:block"
                alt="Light mode"
              />
              <img
                src="./icon-moon.svg"
                class="w-6 h-6 dark:hidden"
                alt="Dark mode"
              />
            </button>

            <div
              class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 hidden group-hover:block bg-slate-800 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-xl"
            >
              <div
                class="absolute top-full left-1/2 -translate-x-1/2 border-8 border-transparent border-t-slate-800"
              ></div>
            </div>
          </div>

          <button>Sign in</button>
          <button class="bg-blue-600 text-white px-5 py-2 rounded-full">
            Sign up
          </button>
        </nav>
      </div>
    </header>

    <script>
      const html = document.documentElement;
      const btn = document.getElementById("btn-toggle");

      btn.addEventListener("click", () => {
        html.classList.toggle("dark");
        console.log("Đã bấm nút!"); // Dòng này để bạn kiểm tra xem nó có chạy không
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
  </body>
</html>
